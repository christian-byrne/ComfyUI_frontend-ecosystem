# Path-based PR auto-labeling
# Used by .github/workflows/labeler.yml (actions/labeler@v5)

# --- Areas ---

area:dashboard:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'
          - 'index.html'
          - 'public/**'
          - 'vite.config.*'
          - 'tailwind.config.*'
          - 'postcss.config.*'

area:data:
  - changed-files:
      - any-glob-to-any-file:
          - 'research/**'
          - 'scripts/data/**'

area:registry:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/services/registry/**'
          - 'src/composables/**registry**'
          - 'src/types/**registry**'

area:tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - '**/*.test.*'
          - '**/*.spec.*'
          - 'playwright.config.*'
          - 'vitest.config.*'

# --- Infrastructure ---

infra:ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'
          - '.github/triage-config.yml'

infra:vercel:
  - changed-files:
      - any-glob-to-any-file:
          - 'vercel.json'
          - '.vercel/**'

# --- Templates / meta ---

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'
          - '.github/PULL_REQUEST_TEMPLATE.md'
          - '.github/ISSUE_TEMPLATE/**'
