name: Vercel Preview

# This workflow does NOT deploy — Vercel's GitHub integration handles that
# automatically per PR. This job only confirms the integration is wired and
# surfaces a friendly comment with the expected preview URL pattern.
#
# Setup (one-time, manual):
#   1. Connect this repo on https://vercel.com/dashboard
#   2. Vercel will auto-deploy a preview for every PR and a prod build on `main`
#   3. The Vercel bot will post the actual preview URL as a PR comment

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  confirm-preview:
    name: Confirm Vercel preview link
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Comment expected preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-preview-confirm -->';
            const branch = context.payload.pull_request.head.ref;
            const repo = context.repo.repo;
            const body = [
              marker,
              '### 🔺 Vercel preview',
              '',
              'Vercel\'s GitHub integration deploys a preview build for every PR.',
              `Once the build finishes, the **Vercel bot** will post the preview URL as a separate comment on this PR.`,
              '',
              `Branch: \`${branch}\``,
              `Project: \`${repo}\` (configure on https://vercel.com/dashboard)`,
              '',
              '_If no preview appears within ~5 minutes, the Vercel GitHub integration may not be connected to this repo._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
