name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on PRs only when 'needs-e2e' label is present, plus on schedule/manual dispatch
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'needs-e2e'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Detect package manifest
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pkg=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json yet — skipping E2E (scaffolding phase)"
          fi

      - name: Install dependencies
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm exec playwright install --with-deps chromium
        continue-on-error: true

      - name: Run Playwright tests
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm run test:e2e --if-present

      - name: Upload Playwright report
        if: always() && steps.detect.outputs.has_pkg == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
