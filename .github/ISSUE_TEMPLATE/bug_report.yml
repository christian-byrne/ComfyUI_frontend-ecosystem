name: Bug Report
description: Report a bug in the ComfyUI Frontend Ecosystem Explorer
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: 'When I ..., I expected ..., but instead ...'
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Area
      options:
        - dashboard (Vue UI)
        - data (research/ bundle, scripts)
        - registry (Comfy Registry integration)
        - tests
        - CI/CD (GitHub Actions)
        - Vercel deploy
        - documentation
        - other
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page / Route (if dashboard bug)
      placeholder: '/patterns/event-listener'
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Visit /patterns
        2. Click on ...
        3. Observe ...
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / Environment
      placeholder: 'Chrome 120 on macOS / preview deploy / local dev'
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Console Output / Screenshots
      description: Paste relevant console errors, network failures, or attach screenshots.
      render: shell
    validations:
      required: false
