name: Feature Request
description: Propose a new feature or enhancement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
      placeholder: "Currently there's no way to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description:
        How should this work? Include API surface, affected pages, or architecture notes if known.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - dashboard (Vue UI)
        - data (research/ bundle, scripts)
        - registry (Comfy Registry integration)
        - tests
        - CI/CD
        - documentation
        - cross-cutting
    validations:
      required: false

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - trivial (~15min)
        - small (~1hr)
        - medium (~half day)
        - large (~1+ day)
        - unknown
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
    validations:
      required: false
