name: Feature Request
description: Propose a new feature or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - dashboard (overview / pages)
        - data-loader (research artifacts → store)
        - registry-client (Comfy Registry API)
        - test-runner page
        - CI / build / Vercel
        - schemas / types
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
