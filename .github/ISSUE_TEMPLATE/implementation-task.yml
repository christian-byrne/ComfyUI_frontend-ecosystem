name: Implementation Task
description: Implementation work item with full process standards
labels: ['enhancement']
body:
  - type: textarea
    id: problem-goal
    attributes:
      label: Problem / Goal
      description: What are we building and why?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Technical approach, affected files, architecture notes.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Concrete, verifiable criteria. Both feature AND quality criteria.
    validations:
      required: true

  - type: dropdown
    id: estimated-effort
    attributes:
      label: Estimated Effort
      description: medium and large tasks should ship with a plan artifact at plans/<issue-number>-*/plan.md
      options:
        - trivial (~15min)
        - small (~1hr)
        - medium (~half day)
        - large (~1+ day)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - dashboard (Vue UI)
        - data (research/ bundle, scripts)
        - registry (Comfy Registry integration)
        - tests
        - CI/CD
        - documentation
        - cross-cutting
    validations:
      required: false

  - type: checkboxes
    id: pre-implementation-checklist
    attributes:
      label: Pre-Implementation Checklist
      description: 'Process standards'
      options:
        - label: Requirements are clear — ambiguities resolved, assumptions stated
        - label: Existing codebase explored — module depth assessed, conventions understood
        - label: plan.md committed at plans/<issue-number>-*/plan.md (medium+ effort)
        - label: NIH check — verified no established library already solves this
        - label: PR split strategy decided — single PR / vertical slices / stacked
        - label: TDD approach evaluated — is RED→GREEN→REFACTOR appropriate?
        - label: Scope checked — no tasks beyond what the ticket requires
        - label: Rollback plan — can this be safely reverted if it fails?

  - type: checkboxes
    id: implementation-checklist
    attributes:
      label: Implementation Checklist
      options:
        - label: 'TDD: separate commits for test (RED) and implementation (GREEN)'
        - label: 'Bug fixes: reproduction test written FIRST in *.regression.test.* file'
        - label: 'Conventional commits used (feat:, fix:, test:, refactor:, docs:)'
        - label: One fix per commit — each commit independently verifiable
        - label: No debug code, console.logs, or TODO hacks in final code
        - label: Operations are idempotent — safe to run twice
        - label: Explicit over clever — no premature abstractions

  - type: checkboxes
    id: testing-checklist
    attributes:
      label: Testing Checklist
      options:
        - label: Tests verify behavior through public interfaces, not implementation details
        - label: Error/boundary/edge cases covered, not just happy path
        - label: Shared mock factories used (no ad-hoc mocks)
        - label: vi.restoreAllMocks() in afterEach; resources cleaned up
        - label: Error assertions are specific — assert code/message/type
        - label: Flaky patterns avoided — deterministic assertions, fake timers, unique temp dirs
        - label: 'Verification evidence: actual command output proving changes work'

  - type: checkboxes
    id: code-review-checklist
    attributes:
      label: Code Review Checklist
      options:
        - label: Self-review before every push — debug code? unintended changes?
        - label: Review feedback verified independently before accepting or rejecting
        - label: Adversarial review for large changes (200+ LOC)
        - label: Regression risk reviewed via git blame on changed/deleted lines

  - type: checkboxes
    id: post-merge-checklist
    attributes:
      label: Post-Merge Checklist
      options:
        - label: Feature branch deleted
        - label: Tracking issues/tickets updated
        - label: AGENTS.md / README updated if architecture changed
        - label: Vercel prod deploy verified

  - type: textarea
    id: related-skills
    attributes:
      label: Related Skills
      description: Skills an implementing agent should load
    validations:
      required: false

  - type: markdown
    attributes:
      value: >-
        **Linter Rules Note:** Many code quality standards (no `any` types, import type separation,
        explicit return types, complexity limits, nesting depth, etc.) are enforced via
        ESLint/linter rules. Run `pnpm typecheck && pnpm lint` to catch these automatically.
