  notes: "ADR 0007 \u2014 NodeExecutionOutput passthrough schema. Status in source: Accepted (2026-03-11). KEY FINDING: backend\
    \ execution payloads are deliberately open-ended (.passthrough() in zOutputs); .catchall() rejected due to TypeScript\
