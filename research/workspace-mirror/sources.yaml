  notes: >-
    PrimeVue component prop API decisions for v2 widget system. Author: Christian Byrne + Pablo (design).
    15 widget components in scope (Button, InputText, Select, ColorPicker, MultiSelect, SelectButton,
    Slider, Textarea, ToggleSwitch, Chart, Image, ImageCompare, Galleria, FileUpload, TreeSelect).
    STATUS WIP: only ToggleSwitch has completed Pick<> types; 14/15 empty. Exclusion rule: strip all
    style/class/dt/pt/*Class/*Style props (no CSS escape hatches). KEY RELEVANCE: (1) Pick<> types are
    the per-component typed options bag for D7 future-pivot (WidgetHandle<T, Opts>); (2) Python
    Component.Input() pattern is the backend INPUT_TYPES counterpart to widget_options sidecar (D7 Part 3);
    (3) 15 component list is the concrete widget-kind enumeration for BC.33 test triples (I-TF.2);
    (4) disabled/readonly props confirm D7 first-class field rule (every-widget concerns already on WidgetHandle).
