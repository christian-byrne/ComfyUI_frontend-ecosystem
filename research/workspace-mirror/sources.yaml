- type: notion_page
  url: https://www.notion.so/comfy-org/Workflow-Serialization-in-ComfyUI-Frontend-A-Historical-Analysis-3596d73d365080c9ba69e945df831c1b
  date_accessed: 2026-05-08
  page_last_edited: 2026-05-07
  status: ingested
  artifact: research/architecture/workflow-serialization-historical-analysis.md
  staging: research/touch-points/staging/R-SER-new-patterns.yaml
  notes: >-
    Authoritative internal doc covering ComfyUI's three-format serialization system (workflow JSON,
    API prompt, extra_pnginfo). Documents full graphToPrompt() anatomy (executionUtil.ts:27), the two
    serialize flags (widget.serialize vs widget.options.serialize), dual schema versions (0.4 vs v1),
    13 historical bugs with exact file+line locations, and maintenance rules. KEY FINDINGS: (1) two
    distinct serialize flags are the root cause of index drift / widget slot corruption; (2)
    graphToPrompt() patching (S6.A1 blast-radius #1) exists because no beforePrompt app-level hook
    exists; (3) __type__: 'CURVE' wrapper has NO current backend consumer; (4) execution_error Zod
    schema is wrong (node_id required but cloud sends null). Staged 3 new patterns: S18.SER1
    (serialize flag confusion), S18.SER2 (onConfigure index patching), S18.SER3 (graph.extra
    persistence). Directly informs I-WS.3, D7, D5/EVT2, PKG2, I-TF.3 harness.
