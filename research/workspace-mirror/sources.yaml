  artifact: research/architecture/uwf-backend-data-model.md
  tasks: I-UWF.9
  notes: >-
    UWF backend data model spec (Matt Miller, Kishore Shimikeri). Four objects: WorkflowSpec,
    WorkflowLayout (backend-opaque), ExecutionPrompt (derived, not stored), RunSnapshot
    (immutable per-execution). KEY FINDINGS: (1) Inputs become { value, link } pairs —
    named not positional, eliminates widget shift bugs; (2) Explicit spec.edges array with
    named input targets; (3) Virtual node resolution (reroutes, Get/Set) happens at save time
    into real edges — layout is opaque, confirms uwf-resolved for S6.A1; (4) Execute overrides
    limited to promoted inputs only — arbitrary node patching not expressible in UWF;
    (5) Three versioning tiers (structural/binding-only/layout-only). Directly informs:
    I-WS.3 (named-input compat), I-UWF.4 (app hook scope), I-UWF.5 (virtual node narrower),
    I-TF.3 (harness must cover both old flat-API and new { value, link } shapes).
