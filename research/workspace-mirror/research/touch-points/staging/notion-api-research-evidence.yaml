  - pattern_id: S4.W1
    notes: "chainCallback independently reimplemented by 5+ packages (VHS, AnimateDiff, KJNodes + 2 more)"
    repo: "(aggregate — Notion §2.2)"
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research
    variant: aggregate-count
    excerpt: |
      // ComfyUI-VideoHelperSuite/web/js/VHS.core.js — one of 5+ independent reimplementations
      function chainCallback(object, property, callback) {
          if (property in object && object[property]) {
              const callback_orig = object[property]
              object[property] = function () {
                  const r = callback_orig.apply(this, arguments);
                  return callback.apply(this, arguments) ?? r
              };
          } else {
              object[property] = callback;
          }
      }

