# ─── NEW patterns not yet in database.yaml ────────────────────────────────────

new_patterns:

  - pattern_id: S16.DOM1
    surface_family: S16
    surface: document.createElement('style') + head.appendChild
    fingerprint: "createElement.*style.*head\\.appendChild|createElement\\('style'\\)"
    semantic: inject CSS into document head for custom node/widget styling
    severity: moderate
    lifecycle_coupling: false
    silent_breakage: true
    occurrences: 354
    packages_affected: 81
    v2_replacement: "extensionManager.injectStyles(css) — proposed; not yet designed"
    decision_ref: null
    notes: "No cleanup mechanism — styles persist after extension disable. Injected styles may conflict with host."
    repo: "(aggregate — Notion §2.3)"
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research
    excerpt: |
      // ComfyUI-KJNodes/web/js/help_popup.js
      styleTag = document.createElement('style')
      styleTag.innerHTML = `.kj-documentation-popup { background: var(--comfy-menu-bg); ... }`
      document.head.appendChild(styleTag)

  - pattern_id: S16.DOM2
    surface_family: S16
    surface: document.body.appendChild (arbitrary DOM)
    fingerprint: "document\\.body\\.appendChild"
    semantic: inject UI panels, toolbars, preview elements into document body
    severity: moderate
    lifecycle_coupling: false
    silent_breakage: true
    occurrences: 364
    packages_affected: 81
    v2_replacement: "extensionManager.addPanel() / addToolbarItem() — proposed"
    decision_ref: null
    notes: "Breaks when frontend DOM structure changes. No cleanup on extension disable."
    repo: "(aggregate — Notion §2.3)"
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research
    excerpt: |
      // ComfyUI-Easy-Use/web_version/v1/js/easy/easy.js
      div = document.createElement('div')
      btn = document.createElement('div')
      document.body.appendChild(toolbar)

  - pattern_id: S16.DOM3
    surface_family: S16
    surface: innerHTML concatenation (potentially user-controlled)
    fingerprint: "\\.innerHTML\\s*="
    semantic: render HTML content (help text, previews, dynamic content) via innerHTML
    severity: high
    lifecycle_coupling: false
    silent_breakage: false
    occurrences: 443
    packages_affected: ~81
    v2_replacement: "safe HTML rendering API; Vue component mounting"
    decision_ref: null
    notes: "XSS risk when content includes user-supplied data or backend output. 443 occurrences is highest DOM count."
    repo: "(aggregate — Notion §2.3)"
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research

  - pattern_id: S16.DOM4
    surface_family: S16
    surface: direct fetch() bypassing api.fetchApi
    fingerprint: "fetch\\(['\"]/"
    semantic: call backend HTTP endpoints without going through the authenticated api.fetchApi wrapper
    severity: moderate
    lifecycle_coupling: false
    silent_breakage: true
    occurrences: 232
    v2_replacement: "api.fetchApi() typed wrapper (S6.A3); formal custom-route registration (S6.A5 direction)"
    decision_ref: null
    notes: "Bypasses auth headers and error normalization. Related to S6.A3 but distinct — no ComfyAPI instance involved."
    repo: "(aggregate — Notion §5.3)"
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research

  - pattern_id: S16.VUE1
    surface_family: S16
    surface: bundled Vue runtime inside DOM widget
    fingerprint: "createApp\\(|vueApp\\.mount\\("
    semantic: mount a Vue application inside addDOMWidget, bundling own copy of Vue runtime
    severity: moderate
    lifecycle_coupling: true
    silent_breakage: false
    occurrences: 9
    packages_affected: 9
    v2_replacement: "registerVueWidget(nodeType, name, Component) sharing host Vue instance"
    decision_ref: null
    notes: "Each package ships own Vue runtime (bundle bloat). Cannot access host stores, i18n, theme. Manual mount/unmount is error-prone."
    repo: ComfyUI-NKD-Sigmas-Curve
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research
    excerpt: |
      // ComfyUI-NKD-Sigmas-Curve — 7000+ line single file includes full Vue runtime
      const vueApp = createApp(SigmaCurveWidget, { onChange: (json) => { ... } });
      const instance = vueApp.mount(container);
      const domWidget = this.addDOMWidget("sigma_curve_editor", "CURVE_EDITOR", container, {
          getValue: () => instance.serialise(),
          setValue: (val) => { instance.deserialise(val); }
      });

  - pattern_id: S3.C2
    surface_family: S3
    surface: LiteGraph.ContextMenu global replacement
    fingerprint: "LiteGraph\\.ContextMenu\\s*="
    semantic: replace the global ContextMenu constructor to customize all right-click menus
    severity: critical
    lifecycle_coupling: false
    silent_breakage: true
    occurrences: 1
    packages_affected: 1
    v2_replacement: "declarative menu contribution API; getExtraMenuOptions hook (already exists for node scope)"
    decision_ref: null
    notes: "Only last-writer wins. Cannot be detected or managed by frontend. ComfyUI-Easy-Use is sole evidenced user."
    repo: ComfyUI-Easy-Use
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research
    excerpt: |
      // ComfyUI-Easy-Use/web_version/v1/js/easy/easyQuick.js
      LiteGraph.ContextMenu = function(values, options) {
          // Completely replaces the global ContextMenu constructor
      }

  - pattern_id: S6.A5
    surface_family: S6
    surface: api.apiURL method patching
    fingerprint: "api\\.apiURL\\s*="
    semantic: intercept URL construction to redirect custom backend routes
    severity: high
    lifecycle_coupling: false
    silent_breakage: true
    occurrences: 1
    packages_affected: 1
    v2_replacement: "formal custom backend route registration API"
    decision_ref: null
    notes: "rgthree redirects /rgthree/* routes. Global patch — only last-writer wins."
    repo: rgthree/rgthree-comfy
    url: "https://www.notion.so/comfy-org/ComfyUI-Custom-Node-Frontend-API-Usage-Research-3356d73d365080dbaacafe8e52d52692"
    source: notion-api-research
    excerpt: |
      // rgthree-comfy — modifies api.apiURL globally
      const apiURL = api.apiURL;
      api.apiURL = function (route) {
          if (route.includes("rgthree/")) {
              return (this.api_base + "/" + route).replace(/\/\//g, "/");
          }
          return apiURL.apply(this, arguments);
      };

  - pattern_id: S12.UI2
