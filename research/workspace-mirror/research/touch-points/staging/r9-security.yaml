  notes: "bandit only scans Python (no JS) and yara malware rules do not target eval/Function/innerHTML \u2014 so direct dynamic-code\
    \ evidence is sparse. The signal we DO surface here is yara rules that flag DOM-injection-equivalent patterns (svg_onload_onerror,\
