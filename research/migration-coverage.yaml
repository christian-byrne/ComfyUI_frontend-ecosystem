# Migration Coverage — D9 Strangler-Fig Status by Pattern
#
# Canonical source for per-pattern v2 migration status. Derived from
# P3-migration-coverage-matrix.md dispositions mapped to D9 taxonomy:
#
#   replaced / re-implemented  ->  ECS-native
#   strangler-figged           ->  strangler-bridge
#   dropped                    ->  unchanged-legacy
#   uwf-resolved               ->  uwf-resolved
#   security-policy (+ replaced) -> ECS-native (has v2 API)
#   security-policy (no v2 API)  -> unchanged-legacy
#
# Schema: pattern_id -> { status, v1_api, v2_api, notes? }
# Status values: ECS-native | strangler-bridge | unchanged-legacy | uwf-resolved

# S1 — ComfyExtension hook slots
S1.H1:
  status: strangler-bridge
  v1_api: 'loadedGraphNode hook'
  v2_api: 'defineNodeExtension({ loadedGraphNode })'
  notes: 'v1 hook fires translated to LoadedFromWorkflow tag dispatch'

S1.H2:
  status: strangler-bridge
  v1_api: 'getCustomWidgets hook'
  v2_api: 'defineWidgetExtension({ widgetType, setup, dispose })'
  notes: 'v1 hook kept alive via strangler until Phase D'

S1.H3:
  status: strangler-bridge
  v1_api: 'getCanvasMenuItems hook'
  v2_api: 'defineCanvasExtension({ menuItems: [...] })'
  notes: 'v1 hook kept alive; items merged into menu'

S1.H4:
  status: strangler-bridge
  v1_api: 'getNodeMenuItems hook'
  v2_api: 'defineNodeExtension({ menuItems: [...] })'

S1.H5:
  status: unchanged-legacy
  v1_api: 'addCustomNodeDefs hook'
  v2_api: '— no v2 replacement —'
  notes: 'BLOCKER D4-G2: needs registerNodeDef(spec) equivalent'

S1.H6:
  status: unchanged-legacy
  v1_api: 'registerCustomNodes hook'
  v2_api: '— no v2 replacement —'
  notes: 'BLOCKER D4-G2: pure-frontend node registration not in v2'

# S2 — Node lifecycle prototype patching
S2.N1:
  status: ECS-native
  v1_api: 'nodeType.prototype.onNodeCreated patching'
  v2_api: 'defineNodeExtension({ nodeTypes: [...], setup(node) {...} })'
  notes: 'Canonical v2 per-instance setup path'

S2.N2:
  status: ECS-native
  v1_api: 'nodeType.prototype.onExecuted patching'
  v2_api: "node.on('executed', (msg) => {...})"
  notes: 'Typed message contract per output kind'

S2.N3:
  status: ECS-native
  v1_api: 'nodeType.prototype.onConnectionsChange patching'
  v2_api: "node.on('connectionChanged', ...)"
  notes: 'Covers connect and disconnect; connected bool in payload'

S2.N4:
  status: ECS-native
  v1_api: 'nodeType.prototype.onRemoved patching'
  v2_api: 'defineNodeExtension({ setup(node) { return { dispose() {...} } } })'
  notes: 'dispose() called on graph deletion, survives subgraph promotion'

S2.N5:
  status: ECS-native
  v1_api: 'nodeType.prototype.getExtraMenuOptions patching'
  v2_api: 'defineNodeExtension({ menuItems: [{label, action, when}] })'
  notes: 'when predicate receives node handle'

S2.N6:
  status: ECS-native
  v1_api: 'nodeType.prototype.onSerialize patching'
  v2_api: "node.on('beforeSerialize', event => event.setSerializedValue(key, val))"
  notes: 'Same v2 event as S2.N15'

S2.N7:
  status: ECS-native
  v1_api: 'nodeType.prototype.onConfigure patching'
  v2_api: 'defineNodeExtension({ loadedGraphNode(node) {...} })'
  notes: 'loadedGraphNode fires only with LoadedFromWorkflow tag'

S2.N8:
  status: unchanged-legacy
  v1_api: 'nodeType.prototype.onAdded patching'
  v2_api: '— no v2 replacement —'
  notes: 'Use nodeCreated + LoadedFromWorkflow tag instead; no after-graph-attach hook in v2'

S2.N9:
  status: ECS-native
  v1_api: 'nodeType.prototype.onDrawForeground patching'
  v2_api: 'defineNodeExtension({ onDraw(node, ctx2d) {...} })'
  notes: 'Phase A: strangler-figged; Phase B: ECS render pass'

S2.N10:
  status: ECS-native
  v1_api: 'nodeType.prototype.onMouseDown patching'
  v2_api: "node.on('mouseDown', (event, pos) => {...})"
  notes: 'Widget-level pointer events also available'

S2.N11:
  status: ECS-native
  v1_api: 'nodeType.prototype.computeSize patching'
  v2_api: 'defineNodeExtension({ minSize: [w, h] })'
  notes: 'Declarative; v2 enforces calling super first'

S2.N12:
  status: ECS-native
  v1_api: 'nodeType.prototype.onConnectInput patching'
  v2_api: "node.on('connectionChanged', { slot, connected, link, direction: 'input' })"
  notes: 'Return-false to refuse: event.preventDefault()'

S2.N13:
  status: ECS-native
  v1_api: 'nodeType.prototype.onConnectOutput patching'
  v2_api: "node.on('connectionChanged', { ..., direction: 'output' })"
  notes: 'Same event shape as S2.N12'

S2.N14:
  status: ECS-native
  v1_api: 'nodeType.prototype.onWidgetChanged patching'
  v2_api: "widget.on('valueChange', fn)"
  notes: 'Fires only on true value change, not option mutations'

S2.N15:
  status: ECS-native
  v1_api: 'nodeType.prototype.serialize patching'
  v2_api: "node.on('beforeSerialize', (event) => {...})"
  notes: 'setSerializedValue / skip typed mutators on event object'

S2.N16:
  status: ECS-native
  v1_api: 'node.widgets array direct access'
  v2_api: 'nodeHandle.widgets() iterator + nodeHandle.widget(name)'
  notes: 'Named lookup aligns with widgets_values_named'

S2.N17:
  status: ECS-native
  v1_api: 'nodeType.prototype.onSelected / onDeselected patching'
  v2_api: "node.on('selected', fn) / node.on('deselected', fn)"
  notes: 'Low blast_radius; straightforward event'

S2.N18:
  status: ECS-native
  v1_api: 'nodeType.prototype.onPropertyChanged patching'
  v2_api: "node.on('propertyChange', ({ key, value, prev }) => {...})"
  notes: 'Low occurrence (rgthree-only); @experimental'

S2.N19:
  status: ECS-native
  v1_api: 'nodeType.prototype.onResize patching'
  v2_api: "node.on('resize', (newSize) => {...})"
  notes: 'Reactive layout system fires after reflow'

